name: Release (Go)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-go-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION from frontend/src/enum/version.ts
        id: appver
        run: |
          V=$(sed -n "s/export const VERSION = '\([^']*\)'.*/\1/p" frontend/src/enum/version.ts)
          if [ -z "$V" ]; then
            echo "Could not parse VERSION from frontend/src/enum/version.ts" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Set release tag (git tag push vs manual)
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=v${{ steps.appver.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend for Go embed
        working-directory: frontend
        run: |
          bun install
          bun run frontend:build-go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod

      - name: Build Go (all platforms)
        working-directory: backend-go
        run: |
          bun install
          bun run build:all

      - name: Pack Go binaries
        id: pack
        run: |
          cd backend-go/bin
          # 遍历当前目录下的所有文件夹
          for dir in */; do
            # 移除文件夹名称末尾的斜杠
            dirname=${dir%/}
            zipname="file-lite-${dirname}-v${{ steps.appver.outputs.version }}.zip"
            echo "Packing $dirname into $zipname"
            zip -r "../../$zipname" "$dirname"
          done

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag_name }}
          name: ${{ steps.rel.outputs.tag_name }}
          generate_release_notes: false
          # 使用通配符匹配所有生成的 zip 文件
          files: |
            file-lite-*-v${{ steps.appver.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
