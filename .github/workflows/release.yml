name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync VERSION from tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -z "$VER" ] || [ "$VER" = "$GITHUB_REF_NAME" ]; then
            echo "Tag must be like v1.2.0 (got: $GITHUB_REF_NAME)" >&2
            exit 1
          fi
          sed -i.bak "s#export const VERSION = '[^']*'#export const VERSION = '${VER}'#" frontend/src/enum/version.ts
          rm -f frontend/src/enum/version.ts.bak

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Node distribution (backend build:auto)
        working-directory: backend
        run: |
          bun install
          bun run build:auto

      - name: Build frontend for Go embed
        working-directory: frontend
        run: |
          bun install
          bun run frontend:build-go

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod

      - name: Setup Node (for backend-go npm scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Go (all platforms)
        working-directory: backend-go
        run: |
          npm install
          npm run build:all

      - name: Pack Go binaries
        run: |
          cd backend-go
          zip -r "../file-lite-go-${{ github.ref_name }}.zip" bin

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            backend/file-lite-v*.zip
            file-lite-go-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
